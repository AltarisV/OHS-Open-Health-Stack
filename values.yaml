# Open Health Stack - Master Helm Values
# This file controls the deployment of all components in the OHS platform.
# All external endpoints, credentials, and resource limits should be customized here.

# Global configuration shared across all subcharts
global:
  domain: "example.org"  # CHANGE_ME: your actual domain
  environment: "development"  # Options: development, staging, production
  timezone: "UTC"
  
  # Shared image pull policy
  imagePullPolicy: "IfNotPresent"  # Options: Always, IfNotPresent, Never
  
  # Pod security context (applied globally if not overridden)
  podSecurityContext:
    runAsNonRoot: false  # CHANGE_ME: enable for production
    fsGroup: 1000

# Database Operators
cloudnative-pg:
  enabled: true
  version: "1.21.0"  # PIN_VERSION
  cnpg:
    crds:
      create: true

mongodb-operator:
  enabled: true
  version: "0.8.0"  # PIN_VERSION

# PostgreSQL Clusters (for EHRbase and Eos)
postgres:
  enabled: true
  # EHRbase database cluster
  ehrbase:
    enabled: true
    storage: "10Gi"  # CHANGE_ME: adjust for your environment
    instances: 3  # High-availability setup (production minimum)
    walStorage: "5Gi"
    backupRetention: "30d"
    primaryUpdateStrategy: "unsupervised"  # Options: unsupervised, rollingUpdate
  
  # Eos (OMOP Bridge) database cluster - can share with EHRbase or be separate
  eos:
    enabled: true
    sharedCluster: true  # true = use same cluster as EHRbase, false = create separate cluster
    storage: "50Gi"  # CHANGE_ME: OMOP CDM requires more space; PIN_VERSION for production
    walStorage: "5Gi"
    instances: 2
    userPassword: ""  # CHANGE_ME: password for the eos PostgreSQL role

  # Cohort Explorer Backend database (numportal schema, shared postgres-cluster)
  numportal:
    enabled: true
    userPassword: "CHANGE_ME_SECURE_PASSWORD"  # CHANGE_ME: password for the numportal PostgreSQL role

  # Keycloak database (shared postgres-cluster)
  keycloak:
    enabled: true
    userPassword: "CHANGE_ME_SECURE_PASSWORD"  # CHANGE_ME: password for the keycloak PostgreSQL role

  # Backup (disabled by default). For production, enable and point at an
  # S3-compatible object store. CNPG needs credentials in a Kubernetes Secret
  # with keys ACCESS_KEY_ID and ACCESS_SECRET_KEY (override key names below).
  backup:
    enabled: false
    destinationPath: ""  # e.g. s3://my-bucket/postgres-backups  CHANGE_ME
    retentionDays: 30
    # endpointURL: "https://s3.internal.example.org"  # for non-AWS / internal MinIO
    # s3Credentials:
    #   secretName: "postgres-backup-s3"   # kubectl create secret generic postgres-backup-s3 ...
    #   accessKeyIdKey: "ACCESS_KEY_ID"
    #   secretAccessKeyKey: "ACCESS_SECRET_KEY"

# MongoDB Clusters (for openFHIR)
mongodb:
  enabled: true
  openfhir:
    enabled: true
    storage: "20Gi"  # CHANGE_ME
    replicas: 3
    rootPassword: "CHANGE_ME_SECURE_PASSWORD"  # CHANGE_ME: inject via Kubernetes Secret in production
    userPassword: "CHANGE_ME_SECURE_PASSWORD"  # CHANGE_ME: password for the openfhir MongoDB user
    persistence:
      enabled: true

# ========== CORE FOSS COMPONENTS ==========

# EHRbase - EHR storage (published Docker image: ehrbase/ehrbase)
ehrbase:
  enabled: true
  replicaCount: 2
  image:
    repository: "ehrbase/ehrbase"
    tag: "2.31.0"  # PIN_VERSION: check https://hub.docker.com/r/ehrbase/ehrbase/tags for latest
    pullPolicy: "IfNotPresent"
  
  service:
    type: "ClusterIP"
    port: 8080
    targetPort: 8080
  
  ingress:
    enabled: true
    path: "/ehrbase"
    pathType: "Prefix"
  
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  # Security: basic auth credentials (inject via Secret in production)
  auth:
    enabled: true
    username: "ehrbase_user"  # CHANGE_ME
    password: "CHANGE_ME_SECURE_PASSWORD"
    type: "BASIC"  # Options: BASIC, OAUTH2
  
  # Database connection (uses PostgreSQL cluster created above)
  database:
    host: "postgres-cluster.default.svc.cluster.local"  # CHANGE_ME: update namespace if different
    port: 5432
    name: "ehrbase"
    username: "ehrbase"
    password: "CHANGE_ME_DATABASE_PASSWORD"  # Inject via Secret
  
  # Probes
  livenessProbe:
    httpGet:
      path: "/health"
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    httpGet:
      path: "/health"
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 5

# openFHIR - FHIR server & EHR-FHIR mapping (published Docker image: openfhir/openfhir)
openfhir:
  enabled: true
  replicaCount: 2
  image:
    repository: "openfhir/openfhir"
    tag: "2.2.1"  # PIN_VERSION: check Docker Hub for latest
    pullPolicy: "IfNotPresent"
  
  service:
    type: "ClusterIP"
    port: 8080
    targetPort: 8080
  
  ingress:
    enabled: true
    path: "/openfhir"
    pathType: "Prefix"
  
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  # FHIR server configuration
  fhir:
    versions: ["STU3", "R4", "R4B"]  # Supported FHIR versions
  
  # Database connection (uses MongoDB cluster created above)
  database:
    mongoUri: "mongodb://openfhir:CHANGE_ME_PASSWORD@mongodb-cluster.default.svc.cluster.local:27017/openfhir"  # CHANGE_ME: inject via Secret
  
  # EHRbase integration (for bidirectional sync)
  ehrbaseIntegration:
    enabled: true
    baseUrl: "http://ehrbase.default.svc.cluster.local:8080"  # CHANGE_ME: update namespace
    username: "ehrbase_user"
    password: "CHANGE_ME_SECURE_PASSWORD"
  
  livenessProbe:
    httpGet:
      path: "/health"
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10

# Eos - OMOP Bridge (published Docker image: ghcr.io/sevkohler/eos)
# Image is only tagged as 'latest' in the upstream registry; pin by digest for production.
# Workflow: https://github.com/SevKohler/Eos/blob/main/.github/workflows/docker-image.yml
eos:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/sevkohler/eos"
    tag: "latest"  # upstream only publishes 'latest'
    # Pinned by digest for production immutability (overrides tag when set).
    # Refresh: docker buildx imagetools inspect ghcr.io/sevkohler/eos:latest
    digest: "sha256:e92baaa035fadb942c57dc7be30de117905ec451fa317d189fc322cc2c3bbd33"
    pullPolicy: "IfNotPresent"
  
  service:
    type: "ClusterIP"
    port: 8081
    targetPort: 8081
  
  ingress:
    enabled: true
    path: "/eos"
    pathType: "Prefix"
  
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  # Database connection (uses PostgreSQL cluster, separate schema/database from EHRbase)
  database:
    host: "postgres-cluster.default.svc.cluster.local"
    port: 5432
    name: "eos_omop"  # OMOP CDM schema here
    username: "eos"
    password: "CHANGE_ME_DATABASE_PASSWORD"
  
  # EHRbase integration
  ehrbase:
    baseUrl: "http://ehrbase.default.svc.cluster.local:8080"
    username: "ehrbase_user"
    password: "CHANGE_ME_SECURE_PASSWORD"
  
  # OMOP vocabularies and mapping files
  omop:
    athenaVocabulariesPresent: false  # CHANGE_ME: must be true for production; vocabularies should be pre-loaded in database
    mappingFiles: "CHANGE_ME_REFERENCE_MAPPINGS"
  
  livenessProbe:
    httpGet:
      path: "/health"
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10

# ========== EHRSUCTION ==========
# EHRsuction exports openEHR compositions from EHRbase to a persistent volume.
# Deployed as a Kubernetes CronJob. No published image — build with build-images.sh
# (component: ehrsuction) and push to your registry.
ehrsuction:
  enabled: true
  image:
    repository: "CHANGE_ME_REGISTRY/ehrsuction"  # CHANGE_ME: your registry/image
    tag: "ohs"
    pullPolicy: "IfNotPresent"
  schedule: "0 3 * * *"   # daily at 03:00
  suspend: true           # set false to enable scheduled runs
  backoffLimit: 1
  config:
    baseUrl: "http://ohs-ehrbase:8080"  # CHANGE_ME: update service name/namespace if different
    platform: "EHRBASE"
    exportType: "CANONICAL"
    steps: 5000
    logging:
      cmdLevel: "info"
      fileLevel: "debug"
  auth:
    username: "ehrbase_user"
    passwordSecret:
      name: "ohs-credentials"
      key: "ehrbase-user-password"
  output:
    persistence:
      enabled: true
      storage: "5Gi"  # CHANGE_ME: adjust for expected export volume
      accessMode: ReadWriteOnce

# ========== COHORT EXPLORER ==========
# Cohort Explorer is a web app to explore/visualize cohorts via openEHR.
# Base profile enables it as part of the standard stack.
# Before installing, make sure the image locations and external URLs below match your environment:
#   1. Build & push Docker images:
#        git clone https://github.com/highmed/cohort-explorer-backend && cd cohort-explorer-backend
#        docker build -t <your-registry>/cohort-explorer-backend:develop .
#        git clone https://github.com/highmed/cohort-explorer-frontend && cd cohort-explorer-frontend
#        docker build --build-arg ENVIRONMENT=deploy -t <your-registry>/cohort-explorer-frontend:develop .
#   2. Add secrets to ohs-credentials:
#        numportal-db-password, numportal-keycloak-secret, numportal-pseudonymity-secret,
#        ehrbase-admin-password, keycloak-admin-password, keycloak-db-password

# Cohort Explorer – Backend (Spring Boot, port 8090)
cohort-explorer-backend:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/highmed/cohort-explorer-backend"  # CHANGE_ME: your registry/image
    tag: "develop"
    pullPolicy: "IfNotPresent"

  service:
    type: "ClusterIP"
    port: 8090
    targetPort: 8090

  ingress:
    enabled: true
    path: "/num-portal"
    pathType: "Prefix"

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  config:
    database:
      host: "postgres-cluster-rw.ohs.svc.cluster.local"
      port: 5432
      name: "numportal"
      schema: "num"
      username: "numportal"
      password: "CHANGE_ME"  # overridden by ohs-credentials secret

    keycloak:
      url: "http://ohs-keycloak.ohs.svc.cluster.local:8080/auth"
      realm: "crr"
      clientId: "num-portal"
      clientSecret: "CHANGE_ME"  # overridden by ohs-credentials secret

    ehrbase:
      restApiUrl: "http://ohs-ehrbase.ohs.svc.cluster.local:8080/ehrbase/"  # CHANGE_ME
      username: "ehrbase_user"
      password: "CHANGE_ME"  # overridden by ohs-credentials secret
      adminUsername: "ehrbase-admin"
      adminPassword: "CHANGE_ME"  # overridden by ohs-credentials secret

    numUrl: "https://ohs.example.org"  # CHANGE_ME: your external URL
    # Restrict to the frontend origin(s). Comma-separated for multiple.
    corsAllowedOrigins: "https://ohs.example.org"  # CHANGE_ME: your frontend origin

    privacy:
      minHits: 30
      pseudonymitySecret: "CHANGE_ME"  # overridden by ohs-credentials secret

    mail:
      enabled: false
      host: "smtp.example.org"
      port: 587
      username: ""
      password: ""
      from: ""

    virusScan:
      enabled: false
      host: "localhost"
      port: 3310

    features:
      searchByManager: "false"
      handleUser: "true"
      workingWithAql: "true"
      cohortExplorer: "true"
      handleContent: "true"
      handleUserMessages: "true"
      handleOrganization: "true"
      handleProject: "true"

# Cohort Explorer – Frontend (Angular/nginx, port 80)
cohort-explorer-frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/highmed/cohort-explorer-frontend"  # CHANGE_ME: your registry/image
    tag: "develop"
    pullPolicy: "IfNotPresent"

  service:
    type: "ClusterIP"
    port: 80
    targetPort: 80

  ingress:
    enabled: true
    path: "/cohort-explorer"
    pathType: "Prefix"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # Runtime config.json – mounted into the nginx container at startup
  config:
    env:
      name: "production"
    api:
      baseUrl: "https://ohs.example.org/num-portal"  # CHANGE_ME: external URL to the backend
    auth:
      baseUrl: "https://ohs.example.org/auth"  # CHANGE_ME: your Keycloak external URL
      realm: "crr"
      clientId: "num-portal-webapp"
    legal:
      copyrightOwner: ""
      imprint: "none"
      imprintUrl: ""
      dataProtection: "none"
      dataProtectionUrl: ""
      contact: "url"
      contactUrl: "https://example.com"  # CHANGE_ME
    welcomePageTitle:
      de: ""
      en: ""

# ========== KEYCLOAK ==========
# Identity and Access Management for the standard OHS deployment.
# Uses the shared postgres-cluster and imports the `crr` realm on first startup.
# Add to ohs-credentials: keycloak-admin-password, keycloak-db-password

keycloak:
  enabled: true
  replicaCount: 1
  image:
    repository: "quay.io/keycloak/keycloak"
    tag: "24.0"  # PIN_VERSION
    pullPolicy: "IfNotPresent"

  service:
    type: "ClusterIP"
    port: 8080
    targetPort: 8080

  ingress:
    enabled: true
    path: "/auth"
    pathType: "Prefix"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  config:
    startMode: "start"
    adminUser: "admin"
    adminPassword: "CHANGE_ME"  # overridden by ohs-credentials secret

    database:
      host: "postgres-cluster-rw.ohs.svc.cluster.local"  # CHANGE_ME: update namespace
      port: 5432
      name: "keycloak"
      username: "keycloak"
      password: "CHANGE_ME"  # overridden by ohs-credentials secret

    hostname: "ohs.example.org"   # CHANGE_ME: external hostname without path
    hostnameUrl: "https://ohs.example.org/auth"  # CHANGE_ME: external Keycloak URL
    httpEnabled: true              # set false when terminating TLS directly at Keycloak
    proxyHeaders: "xforwarded"

# ========== OPENEHRTOOL ==========
# openEHRTool-v2: web UI for browsing EHRs, templates, compositions, and running AQL queries.
# Source: https://github.com/crs4/openEHRTool-v2
#
# PRE-REQUISITES – no public container images exist; build and push yourself:
#
#   1. ONE-LINE REQUIRED PATCH to backend before building:
#      In backend-fastapi/app/config.py, change:
#        SECRET_KEY = "The Last of Us"
#      to:
#        SECRET_KEY = os.environ.get("OPENEHRTOOL_SECRET_KEY", "change-me-in-production")
#      (add 'import os' at top of file if not already present)
#
#   2. Build backend:
#        git clone https://github.com/crs4/openEHRTool-v2
#        docker build -t <your-registry>/openehrtool-backend:master ./openEHRTool-v2/backend-fastapi
#        docker push <your-registry>/openehrtool-backend:master
#
#   3. Build frontend (VITE_BACKEND_HOSTNAME is baked in at build time – must match backend ingress host):
#        docker build \
#          --build-arg VITE_BACKEND_HOSTNAME=<backend-ingress-host> \
#          -t <your-registry>/openehrtool-frontend:master \
#          ./openEHRTool-v2/frontend-vue
#        docker push <your-registry>/openehrtool-frontend:master
#
#   4. Add secret to ohs-credentials:
#        openehrtool-jwt-secret  (strong random string, min 32 chars)

# openEHRTool – Redis cache (activity log + artefact ID caching)
openehrtool-redis:
  enabled: true
  replicaCount: 1
  image:
    repository: "redis"
    tag: "7-alpine"
    pullPolicy: "IfNotPresent"
  service:
    type: "ClusterIP"
    port: 6379
    targetPort: 6379
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  config:
    maxmemory: "64mb"
    maxmemoryPolicy: "allkeys-lru"
    save: ""

# openEHRTool – Backend (FastAPI, port 5000)
openehrtool-backend:
  enabled: true
  replicaCount: 1
  image:
    repository: "localhost:5000/openehrtool-backend"  # built via build-images.sh
    tag: "ohs"
    pullPolicy: "Always"
  service:
    type: "ClusterIP"
    port: 5000
    targetPort: 5000
  ingress:
    enabled: true
    className: ""
    annotations: {}
    # Must match VITE_BACKEND_HOSTNAME used when building the frontend image
    host: "openehrtool"
    path: /
    pathType: "Prefix"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  config:
    ehrbaseNodename: "local.ehrbase.org"  # display label; actual URL entered by users at login
    redis:
      hostname: "ohs-openehrtool-redis"
      port: 6379
    jwtSecretKey: "CHANGE_ME"  # overridden by ohs-credentials secret key: openehrtool-jwt-secret

# openEHRTool – Frontend (Vue3/nginx, port 80)
openehrtool-frontend:
  enabled: true
  replicaCount: 1
  image:
    # VITE_BACKEND_HOSTNAME must be set at image build time (see PRE-REQUISITES above).
    # Rebuild the image if the backend ingress hostname changes.
    repository: "localhost:5000/openehrtool-frontend"  # built via build-images.sh
    tag: "ohs"
    pullPolicy: "Always"
  service:
    type: "ClusterIP"
    port: 80
    targetPort: 80
  ingress:
    enabled: true
    className: ""
    annotations: {}
    host: "openehrtool"
    path: /
    pathType: "Prefix"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ========== NETWORKING & INGRESS ==========

ingress:
  enabled: true
  className: "nginx"  # CHANGE_ME: your ingress controller class (e.g., "traefik", "gce")
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # CHANGE_ME: if using cert-manager
  
  tls:
    enabled: true
    issuer: "letsencrypt-prod"  # CHANGE_ME: let's encrypt issuer name, or "self-signed" for dev
  
  hosts:
    - host: "ohs.example.org"  # CHANGE_ME: your actual domain
      paths:
        - path: "/ehrbase"
          pathType: "Prefix"
          service: "ohs-ehrbase"
          port: 8080
        - path: "/openfhir"
          pathType: "Prefix"
          service: "ohs-openfhir"
          port: 8080
        - path: "/eos"
          pathType: "Prefix"
          service: "ohs-eos"
          port: 8081
        - path: "/auth"
          pathType: "Prefix"
          service: "ohs-keycloak"
          port: 8080
        - path: "/num-portal"
          pathType: "Prefix"
          service: "ohs-cohort-explorer-backend"
          port: 8090
        - path: "/cohort-explorer"
          pathType: "Prefix"
          service: "ohs-cohort-explorer-frontend"
          port: 80

# ========== MONITORING & LOGGING (OPTIONAL) ==========

monitoring:
  enabled: false  # Disable by default; enable if Prometheus is running in cluster
  prometheus:
    servicemonitor:
      enabled: false  # Creates ServiceMonitor CRD for Prometheus Operator
      interval: 30s
      scrapeTimeout: 10s

logging:
  enabled: false  # Disable by default
  # For integration with ELK, Loki, etc., configure here

# ========== NETWORK POLICY & MICROSEGMENTATION ==========

networkPolicy:
  enabled: true  # Enable NetworkPolicy for production
  # Label value of the OHS namespace (kubectl label namespace <ns> name=<value>).
  # Defaults to the release namespace name when empty.
  namespaceLabel: ""
  # Namespace label of your ingress controller (default assumes ingress-nginx).
  ingressControllerNamespace: "ingress-nginx"  # CHANGE_ME if different
  # HTTP ports the ingress controller is allowed to reach on app pods.
  httpPorts:
    - 8080  # ehrbase / openfhir / keycloak
    - 8081  # eos
    - 8090  # cohort-explorer-backend
    - 80    # cohort-explorer-frontend / openehrtool-frontend

# ========== SECURITY & RBAC ==========

rbac:
  create: true  # Create ServiceAccount, ClusterRole, ClusterRoleBinding
  name: "ohs"

# ========== NAMESPACE ==========

namespace:
  name: "default"  # CHANGE_ME: create and use a dedicated namespace in production
  create: false  # Set to true if you want Helm to create the namespace

