apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  # Keycloak in start-dev mode is single-replica only; start mode supports HA but
  # requires Infinispan/JGroups clustering config (out of scope here).
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
          - {{ .Values.config.startMode | quote }}
          - "--http-relative-path=/auth"
          {{- if .Values.config.realmImport.enabled }}
          - "--import-realm"
          {{- end }}

        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP

        env:
        # ── Admin credentials ──────────────────────────────────────────────
        - name: KEYCLOAK_ADMIN
          value: {{ .Values.config.adminUser | quote }}
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: keycloak-admin-password

        # ── Database ───────────────────────────────────────────────────────
        - name: KC_DB
          value: "postgres"
        - name: KC_DB_URL
          value: "jdbc:postgresql://{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.config.database.name }}"
        - name: KC_DB_USERNAME
          value: {{ .Values.config.database.username | quote }}
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-keycloak-user-secret
              key: password

        # ── Hostname / proxy ───────────────────────────────────────────────
        # KC_HOSTNAME and KC_HOSTNAME_URL are mutually exclusive in Keycloak 24
        {{- if .Values.config.hostnameUrl }}
        - name: KC_HOSTNAME_URL
          value: {{ .Values.config.hostnameUrl | quote }}
        - name: KC_HOSTNAME_ADMIN_URL
          value: {{ .Values.config.hostnameUrl | quote }}
        {{- else }}
        - name: KC_HOSTNAME
          value: {{ .Values.config.hostname | quote }}
        {{- end }}
        - name: KC_HTTP_ENABLED
          value: {{ .Values.config.httpEnabled | quote }}
        - name: KC_PROXY_HEADERS
          value: {{ .Values.config.proxyHeaders | quote }}

        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        {{- if .Values.startupProbe.enabled }}
        startupProbe:
          {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        resources:
          {{- toYaml .Values.resources | nindent 12 }}

        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- if .Values.config.realmImport.enabled }}
        volumeMounts:
        - name: realm-import
          mountPath: /opt/keycloak/data/import
          readOnly: true
        {{- end }}

      {{- if .Values.config.realmImport.enabled }}
      initContainers:
      # Substitutes __NUM_PORTAL_CLIENT_SECRET__ in the realm JSON with the actual secret
      # value, writing the result to an emptyDir that the main container imports from.
      - name: realm-config
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            sed "s|__NUM_PORTAL_CLIENT_SECRET__|${NUM_PORTAL_CLIENT_SECRET}|g" \
              /import-source/crr-realm.json > /import/crr-realm.json
        env:
        - name: NUM_PORTAL_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: numportal-keycloak-secret
        volumeMounts:
        - name: realm-source
          mountPath: /import-source
          readOnly: true
        - name: realm-import
          mountPath: /import
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.config.realmImport.enabled }}
      volumes:
      - name: realm-source
        configMap:
          name: {{ include "keycloak.fullname" . }}-realm
      - name: realm-import
        emptyDir: {}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "keycloak.selectorLabels" . | nindent 4 }}
