apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ehrbase.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ehrbase.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ehrbase.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ehrbase.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.startupDependencies.postgres.enabled }}
      initContainers:
      - name: wait-for-postgres
        image: {{ .Values.startupDependencies.postgres.image | quote }}
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          until pg_isready -h {{ .Values.config.database.host | quote }} -p {{ .Values.config.database.port }} -U {{ .Values.config.database.username | quote }} -q; do
            echo "Waiting for PostgreSQL at {{ .Values.config.database.host }}:{{ .Values.config.database.port }}..."
            sleep 3
          done
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        
        env:
        # Authentication configuration
        - name: SECURITY_AUTHUSER
          value: {{ .Values.config.auth.username | quote }}
        - name: SECURITY_AUTHPASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: ehrbase-user-password
        - name: SECURITY_AUTHTYPE
          value: {{ .Values.config.auth.type | quote }}
        
        # Database configuration
        - name: DB_URL
          value: "jdbc:postgresql://{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.config.database.name }}"
        - name: DB_USER_ADMIN
          valueFrom:
            secretKeyRef:
              name: postgres-cluster-app
              key: username
        - name: DB_PASS_ADMIN
          valueFrom:
            secretKeyRef:
              name: postgres-cluster-app
              key: password
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-cluster-app
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-cluster-app
              key: password
        
        # Java/JVM configuration
        - name: JAVA_OPTS
          value: "-Xmx{{ .Values.config.jvm.maxHeapSize }} -Xms{{ .Values.config.jvm.minHeapSize }} -XX:+UseG1GC"
        
        # Logging configuration
        - name: LOGGING_LEVEL_ROOT
          value: {{ .Values.config.logging.level | quote }}
        
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}
        
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ehrbase.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ehrbase.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ehrbase.selectorLabels" . | nindent 4 }}
