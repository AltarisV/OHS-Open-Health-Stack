# EHRbase Helm Chart Values
# This chart deploys EHRbase, the openEHR EHR storage system

# Component configuration
replicaCount: 2

image:
  repository: ehrbase/ehrbase
  tag: "2.31.0"  # PIN_VERSION: check https://hub.docker.com/r/ehrbase/ehrbase/tags
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

ingress:
  enabled: true
  className: ""  # Inherits from parent chart
  annotations: {}
  path: /ehrbase
  pathType: Prefix
  hosts: []  # Inherits from parent chart

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# EHRbase-specific configuration
config:
  auth:
    enabled: true
    username: ehrbase_user
    password: CHANGE_ME_SECURE_PASSWORD  # Inject via Secret
    type: BASIC  # Options: BASIC, OAUTH2
  
  database:
    host: postgres-cluster.default.svc.cluster.local
    port: 5432
    name: ehrbase
    username: ehrbase
    password: CHANGE_ME_DATABASE_PASSWORD  # Inject via Secret
  
  # Java/Spring Boot configuration
  jvm:
    maxHeapSize: "2g"
    minHeapSize: "512m"
  
  # Logging
  logging:
    level: INFO  # Options: DEBUG, INFO, WARN, ERROR
    format: json  # Options: json, text

# Health checks
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod configuration
podAnnotations:
  prometheus.io/scrape: "false"  # Enable if Prometheus monitoring is active

podSecurityContext: {}

securityContext:
  runAsNonRoot: false
  runAsUser: 0

nodeSelector: {}

tolerations: []

affinity: {}

