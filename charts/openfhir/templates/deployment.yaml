apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfhir.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openfhir.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openfhir.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openfhir.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        
        env:
        # MongoDB configuration
        - name: SPRING_DATA_MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: openfhir-mongo-uri
        
        # FHIR versions
        - name: FHIR_VERSIONS
          value: '{{ join "," .Values.config.fhir.versions }}'
        
        # EHRbase integration
        - name: EHRBASE_ENABLED
          value: "{{ .Values.config.ehrbase.enabled }}"
        - name: EHRBASE_URL
          value: {{ .Values.config.ehrbase.baseUrl | quote }}
        - name: EHRBASE_USER
          value: {{ .Values.config.ehrbase.username | quote }}
        - name: EHRBASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: ehrbase-user-password
        
        # Logging
        - name: LOGGING_LEVEL_ROOT
          value: {{ .Values.config.logging.level | quote }}
        
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}
        
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openfhir.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openfhir.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openfhir.selectorLabels" . | nindent 4 }}
