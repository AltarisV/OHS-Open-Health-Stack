apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openehrtool-redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openehrtool-redis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openehrtool-redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openehrtool-redis.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: redis
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - redis-server
          - /etc/redis/redis.conf
        ports:
        - name: redis
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        volumeMounts:
        - name: redis-conf
          mountPath: /etc/redis/redis.conf
          subPath: redis.conf
          readOnly: true
        {{- if .Values.persistence.enabled }}
        - name: redis-data
          mountPath: /data
        {{- end }}
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      volumes:
      - name: redis-conf
        configMap:
          name: {{ include "openehrtool-redis.fullname" . }}-conf
      {{- if .Values.persistence.enabled }}
      - name: redis-data
        persistentVolumeClaim:
          claimName: {{ include "openehrtool-redis.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openehrtool-redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openehrtool-redis.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: redis
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
  selector:
    {{- include "openehrtool-redis.selectorLabels" . | nindent 4 }}
