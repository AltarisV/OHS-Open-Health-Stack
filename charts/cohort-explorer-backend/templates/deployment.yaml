apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cohort-explorer-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cohort-explorer-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cohort-explorer-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cohort-explorer-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: management
          containerPort: 8091
          protocol: TCP

        env:
        # ── Database ───────────────────────────────────────────────────────
        - name: SPRING_DATASOURCE_NUMPORTAL_URL
          value: "jdbc:postgresql://{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.config.database.name }}?currentSchema={{ .Values.config.database.schema }}"
        - name: SPRING_DATASOURCE_NUMPORTAL_USERNAME
          value: {{ .Values.config.database.username | quote }}
        - name: SPRING_DATASOURCE_NUMPORTAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: numportal-db-password

        # ── Keycloak / OAuth2 ──────────────────────────────────────────────
        - name: KEYCLOAK_URL
          value: {{ .Values.config.keycloak.url | quote }}
        # Explicit provider config so Spring Security finds the provider in all contexts
        # (including Feign child contexts that don't inherit YAML property sources)
        - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_USERSTORECLIENT_CLIENT_ID
          value: {{ .Values.config.keycloak.clientId | quote }}
        - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_USERSTORECLIENT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: numportal-keycloak-secret
        - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_USERSTORECLIENT_AUTHORIZATION_GRANT_TYPE
          value: "client_credentials"
        - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_USERSTORECLIENT_TOKEN_URI
          value: "{{ .Values.config.keycloak.url }}/realms/{{ .Values.config.keycloak.realm }}/protocol/openid-connect/token"
        - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
          value: "{{ .Values.config.keycloak.url }}/realms/{{ .Values.config.keycloak.realm }}/protocol/openid-connect/certs"

        # ── EHRbase ────────────────────────────────────────────────────────
        - name: EHRBASE_REST_API_URL
          value: {{ .Values.config.ehrbase.restApiUrl | quote }}
        - name: EHRBASE_USERNAME
          value: {{ .Values.config.ehrbase.username | quote }}
        - name: EHRBASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: ehrbase-user-password
        - name: EHRBASE_ADMINUSERNAME
          value: {{ .Values.config.ehrbase.adminUsername | quote }}
        - name: EHRBASE_ADMINPASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: ehrbase-admin-password

        # ── CORS ───────────────────────────────────────────────────────────
        - name: CORS_ALLOWEDORIGINS_0
          value: {{ .Values.config.corsAllowedOrigins | quote }}

        # ── External URL ───────────────────────────────────────────────────
        - name: NUM_URL
          value: {{ .Values.config.numUrl | quote }}

        # ── Privacy ────────────────────────────────────────────────────────
        - name: PRIVACY_MINHITS
          value: {{ .Values.config.privacy.minHits | quote }}
        - name: PRIVACY_PSEUDONYMITYSECRET
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: numportal-pseudonymity-secret

        # ── Feature flags ──────────────────────────────────────────────────
        - name: FEATURE_SEARCH_BY_MANAGER
          value: {{ .Values.config.features.searchByManager | quote }}
        - name: FEATURE_HANDLE_USER
          value: {{ .Values.config.features.handleUser | quote }}
        - name: FEATURE_WORKING_WITH_AQL
          value: {{ .Values.config.features.workingWithAql | quote }}
        - name: FEATURE_COHORT_EXPLORER
          value: {{ .Values.config.features.cohortExplorer | quote }}
        - name: FEATURE_HANDLE_CONTENT
          value: {{ .Values.config.features.handleContent | quote }}
        - name: FEATURE_HANDLE_USER_MESSAGES
          value: {{ .Values.config.features.handleUserMessages | quote }}
        - name: FEATURE_HANDLE_ORGANIZATION
          value: {{ .Values.config.features.handleOrganization | quote }}
        - name: FEATURE_HANDLE_PROJECT
          value: {{ .Values.config.features.handleProject | quote }}

        # ── Mail (optional) ────────────────────────────────────────────────
        - name: SPRING_MAIL_HOST
          value: {{ .Values.config.mail.host | quote }}
        - name: SPRING_MAIL_PORT
          value: {{ .Values.config.mail.port | quote }}
        - name: SPRING_MAIL_USERNAME
          value: {{ .Values.config.mail.username | quote }}
        - name: SPRING_MAIL_PASSWORD
          value: {{ .Values.config.mail.password | quote }}
        - name: NUM_OPERATOR
          value: ""

        # ── Attachment database ────────────────────────────────────────────
        # AttachmentService is @ConditionalOnProperty(num.enableAttachmentDatabase=true)
        # and ProjectMapper unconditionally requires it, so we must enable it.
        - name: NUM_ENABLEATTACHMENTDATABASE
          value: {{ .Values.config.attachmentDatabase.enabled | quote }}
        - name: SPRING_DATASOURCE_NUMPORTALATTACHMENT_URL
          value: "jdbc:postgresql://{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.config.database.name }}?currentSchema={{ .Values.config.attachmentDatabase.schema }}"
        - name: SPRING_DATASOURCE_NUMPORTALATTACHMENT_USERNAME
          value: {{ .Values.config.database.username | quote }}
        - name: SPRING_DATASOURCE_NUMPORTALATTACHMENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: numportal-db-password
        - name: SPRING_FLYWAY_NUMPORTALATTACHMENT_LOCATIONS
          value: "classpath:db/migration/num-portal-attachment"

        # ── Virus scanning (ClamAV) ────────────────────────────────────────
        - name: NUM_FILEVIRUSSCANENABLED
          value: {{ .Values.config.virusScan.enabled | quote }}
        - name: CLAMAV_HOST
          value: {{ .Values.config.virusScan.host | quote }}
        - name: CLAMAV_PORT
          value: {{ .Values.config.virusScan.port | quote }}

        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        resources:
          {{- toYaml .Values.resources | nindent 12 }}

        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cohort-explorer-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cohort-explorer-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 8091
      targetPort: management
      protocol: TCP
      name: management
  selector:
    {{- include "cohort-explorer-backend.selectorLabels" . | nindent 4 }}
