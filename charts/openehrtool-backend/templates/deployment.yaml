apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openehrtool-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openehrtool-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openehrtool-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openehrtool-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP

        env:
        # ── EHRBase ────────────────────────────────────────────────────────
        # nodename is a display/routing identifier, not a hostname.
        # The actual EHRBase URL is entered by users at login time.
        - name: EHRBASESERVER_nodename
          value: {{ .Values.config.ehrbaseNodename | quote }}

        # ── Redis ──────────────────────────────────────────────────────────
        - name: REDISSERVER_hostname
          value: {{ .Values.config.redis.hostname | quote }}
        - name: REDISSERVER_port
          value: {{ .Values.config.redis.port | quote }}

        # ── JWT secret ─────────────────────────────────────────────────────
        # Requires the one-line patch: Config.SECRET_KEY = os.environ.get("OPENEHRTOOL_SECRET_KEY", ...)
        - name: OPENEHRTOOL_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: openehrtool-jwt-secret

        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}

        resources:
          {{- toYaml .Values.resources | nindent 12 }}

        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openehrtool-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openehrtool-backend.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
  selector:
    {{- include "openehrtool-backend.selectorLabels" . | nindent 4 }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openehrtool-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openehrtool-backend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: {{ .Values.ingress.path }}
        pathType: {{ .Values.ingress.pathType }}
        backend:
          service:
            name: {{ include "openehrtool-backend.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
