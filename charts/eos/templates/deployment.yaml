apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eos.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "eos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "eos.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        
        env:
        # Database configuration
        - name: DB_URL
          value: "jdbc:postgresql://{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.config.database.name }}"
        - name: DB_USER
          value: {{ .Values.config.database.username | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: eos-db-password
        
        # EHRbase configuration
        - name: EHRBASE_ENABLED
          value: "{{ .Values.config.ehrbase.enabled }}"
        - name: EHRBASE_URL
          value: {{ .Values.config.ehrbase.baseUrl | quote }}
        - name: EHRBASE_USER
          value: {{ .Values.config.ehrbase.username | quote }}
        - name: EHRBASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: ehrbase-user-password
        
        # OMOP configuration
        - name: ATHENA_VOCABULARIES_PRESENT
          value: "{{ .Values.config.omop.athenaVocabulariesPresent }}"
        - name: MAPPING_FILES_PATH
          value: {{ .Values.config.omop.mappingFilesPath | quote }}
        
        # Java/JVM configuration
        - name: JAVA_OPTS
          value: "-Xmx{{ .Values.config.jvm.maxHeapSize }} -Xms{{ .Values.config.jvm.minHeapSize }}"
        
        # Logging
        - name: LOGGING_LEVEL_ROOT
          value: {{ .Values.config.logging.level | quote }}
        
        volumeMounts:
        # Mount ConfigMap with OMOP mapping files (optional)
        - name: mapping-files
          mountPath: {{ .Values.config.omop.mappingFilesPath }}
          readOnly: true
        
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        {{- end }}
        
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      
      volumes:
      - name: mapping-files
        configMap:
          name: eos-mapping-files
          optional: true  # Optional: ConfigMap may not exist yet
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eos.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "eos.selectorLabels" . | nindent 4 }}
