apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eos.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "eos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "eos.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.startupDependencies.postgres.enabled .Values.startupDependencies.ehrbase.enabled }}
      initContainers:
      {{- if .Values.startupDependencies.postgres.enabled }}
      - name: wait-for-postgres
        image: {{ .Values.startupDependencies.postgres.image | quote }}
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          until pg_isready -h {{ .Values.config.database.host | quote }} -p {{ .Values.config.database.port }} -U {{ .Values.config.database.username | quote }} -q; do
            echo "Waiting for PostgreSQL at {{ .Values.config.database.host }}:{{ .Values.config.database.port }}..."
            sleep 3
          done
      {{- end }}
      {{- if .Values.startupDependencies.ehrbase.enabled }}
      - name: wait-for-ehrbase
        image: {{ .Values.startupDependencies.ehrbase.image | quote }}
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        - |
          until wget -q -T 5 -O /dev/null "{{ .Values.config.ehrbase.baseUrl }}/rest/openehr/v1/definition/template/adl1.4"; do
            echo "Waiting for EHRbase at {{ .Values.config.ehrbase.baseUrl }}..."
            sleep 5
          done
      {{- end }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        
        env:
        # Database configuration (Spring Boot relaxed binding)
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://{{ .Values.config.database.host }}:{{ .Values.config.database.port }}/{{ .Values.config.database.name }}"
        - name: SPRING_DATASOURCE_USERNAME
          value: {{ .Values.config.database.username | quote }}
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-eos-user-secret
              key: password
        
        # EHRbase / openEHR configuration
        - name: OPENEHR_BASE_URL
          value: {{ .Values.config.ehrbase.baseUrl | quote }}
        - name: OPENEHR_SECURITY_TYPE
          value: "basic"
        - name: OPENEHR_SECURITY_USER_NAME
          value: {{ .Values.config.ehrbase.username | quote }}
        - name: OPENEHR_SECURITY_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ohs-credentials
              key: ehrbase-user-password
        
        # Java/JVM configuration
        - name: JAVA_TOOL_OPTIONS
          value: "-Xmx{{ .Values.config.jvm.maxHeapSize }} -Xms{{ .Values.config.jvm.minHeapSize }}"
        
        # Logging
        - name: LOGGING_LEVEL_ROOT
          value: {{ .Values.config.logging.level | quote }}
        
        volumeMounts:
        # Mount ConfigMap with OMOP mapping files (optional)
        - name: mapping-files
          mountPath: {{ .Values.config.omop.mappingFilesPath }}
          readOnly: true
        
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}
        
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}
      
      volumes:
      - name: mapping-files
        configMap:
          name: eos-mapping-files
          optional: true  # Optional: ConfigMap may not exist yet
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eos.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "eos.selectorLabels" . | nindent 4 }}
