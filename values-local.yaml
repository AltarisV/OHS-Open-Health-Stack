# Local Docker Desktop Kubernetes overrides for OHS
# Use with: helm upgrade --install ohs . -n ohs -f values.yaml -f values-local.yaml --timeout 15m

ingress:
  enabled: false

# Production NetworkPolicy is not part of the local dev profile.
networkPolicy:
  enabled: false

postgres:
  numportal:
    enabled: true
  keycloak:
    enabled: true
  ehrbase:
    instances: 1

mongodb:
  enabled: true
  openfhir:
    enabled: true
    replicas: 1
    storage: "20Gi"
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

ehrbase:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"

openfhir:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  # Probes hit openFHIR's GET /health endpoint (returns 200 "UP"); timings come from the
  # subchart defaults (liveness initialDelay 30s, safe vs ~11s startup).
  livenessProbe:
    enabled: true
  readinessProbe:
    enabled: true
  config:
    ehrbase:
      baseUrl: "http://ohs-ehrbase:8080"

eos:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "3Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"
    ehrbase:
      baseUrl: "http://ohs-ehrbase:8080"
    jvm:
      maxHeapSize: "1g"

# ── EHRsuction ────────────────────────────────────────────────────────────────
# Build image before deploying (Docker Desktop shares the host Docker daemon — no eval needed):
#   bash build-images.sh --registry localhost:5000 --component ehrsuction --skip-push
ehrsuction:
  enabled: true
  image:
    repository: "localhost:5000/ehrsuction"
    tag: "ohs"
    pullPolicy: Never
  schedule: "0 3 * * *"
  suspend: true
  backoffLimit: 1
  config:
    baseUrl: "http://ohs-ehrbase:8080"
    platform: "EHRBASE"
    exportType: "CANONICAL"
    steps: 5000
    logging:
      cmdLevel: "info"
      fileLevel: "debug"
  auth:
    username: "ehrbase_user"
    passwordSecret:
      name: "ohs-credentials"
      key: "ehrbase-user-password"
  output:
    persistence:
      enabled: true
      storage: "5Gi"
      accessMode: ReadWriteOnce

# ── Cohort Explorer ───────────────────────────────────────────────────────────
# Build images before deploying:
#   bash build-images.sh --registry localhost:5000 --component cohort-explorer-backend --skip-push
#   bash build-images.sh --registry localhost:5000 --component cohort-explorer-frontend --skip-push

cohort-explorer-backend:
  enabled: true
  replicaCount: 1
  image:
    repository: localhost:5000/cohort-explorer-backend
    tag: "ohs"
    pullPolicy: Never
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"
    keycloak:
      url: "http://ohs-keycloak:8080/auth"   # /auth because KC_HOSTNAME_URL sets relative path
    ehrbase:
      restApiUrl: "http://ohs-ehrbase:8080/ehrbase/"
    # Local frontend served via port-forward at http://localhost:8085
    corsAllowedOrigins: "http://localhost:8085"

cohort-explorer-frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: localhost:5000/cohort-explorer-frontend
    tag: "ohs"
    pullPolicy: Never
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    api:
      baseUrl: "http://localhost:8084/num-portal"
    auth:
      baseUrl: "http://localhost:8083/auth"
      realm: "crr"
      clientId: "num-portal-webapp"

# ── openEHRTool ──────────────────────────────────────────────────────────────
# VITE_BACKEND_HOSTNAME is baked into the frontend JS bundle at build time.
# For local access via kubectl port-forward, use localhost.
# Build images before deploying:
#   bash build-images.sh --registry localhost:5000 --component openehrtool-backend --skip-push
#   OPENEHRTOOL_BACKEND_HOSTNAME=localhost bash build-images.sh --registry localhost:5000 --component openehrtool-frontend --skip-push

openehrtool-redis:
  enabled: true

openehrtool-backend:
  enabled: true
  image:
    repository: "localhost:5000/openehrtool-backend"
    tag: "ohs"
    pullPolicy: Never
  ingress:
    host: "openehrtool"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    redis:
      hostname: "ohs-openehrtool-redis"

openehrtool-frontend:
  enabled: true
  image:
    repository: "localhost:5000/openehrtool-frontend"
    tag: "ohs"
    pullPolicy: Never
  ingress:
    host: "openehrtool"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false

keycloak:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: true
    httpGet:
      path: /auth/realms/master/.well-known/openid-configuration
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    enabled: true
    httpGet:
      path: /auth/realms/master/.well-known/openid-configuration
      port: 8080
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  config:
    startMode: "start-dev"
    hostname: "localhost"
    hostnameUrl: "http://localhost:8083/auth"
    database:
      host: "postgres-cluster-rw"
      minHeapSize: "256m"
    testUser:
      enabled: true
