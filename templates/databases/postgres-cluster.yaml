{{- if .Values.postgres.enabled }}
---
# Secret for eos PostgreSQL role (used by CNPG managed roles)
{{- if .Values.postgres.ehrbase.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-eos-user-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
type: kubernetes.io/basic-auth
stringData:
  username: eos
  password: {{ .Values.postgres.eos.userPassword | default "eos" | quote }}
{{- end }}
---
# PostgreSQL Cluster for EHRbase
{{- if .Values.postgres.ehrbase.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgres
    component: ehrbase-database
    release: {{ .Release.Name }}
  annotations:
    # Deploy after all other resources so the CloudNativePG operator CRD is registered
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  # Number of PostgreSQL instances (HA replicas)
  instances: {{ .Values.postgres.ehrbase.instances | default 3 }}
  
  # Primary update strategy
  primaryUpdateStrategy: {{ .Values.postgres.ehrbase.primaryUpdateStrategy | default "unsupervised" }}
  
  # PostgreSQL version and image
  # imageName is omitted; CNPG uses its operator-bundled default image
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "1280kB"
      # min_wal_size and max_wal_size intentionally omitted;
      # defaults (80MB/1GB) work for any WAL volume size.
  
  # Bootstrap configuration (initial database setup)
  bootstrap:
    initdb:
      database: "ehrbase"
      owner: "ehrbase"
      postInitSQL:
        # Cluster-level operations (run in postgres db as superuser)
        # Create eos role and eos_omop database (separate DB for Eos OMOP bridge)
        - "CREATE ROLE eos WITH LOGIN;"
        - "CREATE DATABASE eos_omop OWNER eos;"
        - "GRANT ALL PRIVILEGES ON DATABASE eos_omop TO eos;"
        {{- if .Values.postgres.numportal.enabled }}
        # Create numportal role and database (for Cohort Explorer Backend)
        - "CREATE ROLE numportal WITH LOGIN;"
        - "CREATE DATABASE numportal OWNER numportal;"
        - "GRANT ALL PRIVILEGES ON DATABASE numportal TO numportal;"
        {{- end }}
        {{- if .Values.postgres.keycloak.enabled }}
        # Create keycloak role and database (for Keycloak IAM)
        - "CREATE ROLE keycloak WITH LOGIN;"
        - "CREATE DATABASE keycloak OWNER keycloak;"
        - "GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;"
        {{- end }}
      postInitApplicationSQL:
        # ehrbase database setup (run in ehrbase db as superuser)
        - "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
        - "CREATE SCHEMA IF NOT EXISTS ehrbase;"
        - "GRANT USAGE ON SCHEMA ehrbase TO ehrbase;"
        - "ALTER DEFAULT PRIVILEGES IN SCHEMA ehrbase GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO ehrbase;"
  
  # Storage configuration
  storage:
    size: {{ .Values.postgres.ehrbase.storage | default "10Gi" }}
  
  # WAL (Write-Ahead Log) storage
  walStorage:
    size: {{ .Values.postgres.ehrbase.walStorage | default "5Gi" }}
  
  {{- if .Values.postgres.backup.enabled }}
  # Backup configuration (set postgres.backup.enabled=true and configure destinationPath)
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
      recoveryWindowInDays: {{ .Values.postgres.backup.retentionDays | default 30 }}
  {{- end }}
  
  # Monitoring and observability
  monitoring:
    enablePodMonitor: {{ .Values.monitoring.enabled | default false }}
  
  # Managed roles (CNPG sets PostgreSQL role passwords from secrets)
  managed:
    roles:
      - name: eos
        ensure: present
        login: true
        passwordSecret:
          name: postgres-eos-user-secret
      {{- if .Values.postgres.numportal.enabled }}
      - name: numportal
        ensure: present
        login: true
        passwordSecret:
          name: postgres-numportal-user-secret
      {{- end }}
      {{- if .Values.postgres.keycloak.enabled }}
      - name: keycloak
        ensure: present
        login: true
        passwordSecret:
          name: postgres-keycloak-user-secret
      {{- end }}
  
  # Resource requests and limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

{{- end }}

# PostgreSQL Cluster for Eos (OMOP CDM)
{{- if .Values.postgres.eos.enabled }}
{{- if not .Values.postgres.eos.sharedCluster }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-eos-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgres
    component: eos-database
    release: {{ .Release.Name }}
spec:
  instances: {{ .Values.postgres.eos.instances | default 2 }}
  primaryUpdateStrategy: {{ .Values.postgres.ehrbase.primaryUpdateStrategy | default "unsupervised" }}
  
  imageName: "ghcr.io/cloudnative-pg/postgresql:15"
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "512MB"
      effective_cache_size: "2GB"
      maintenance_work_mem: "128MB"
  
  bootstrap:
    initdb:
      database: "eos_omop"
      owner: "eos"
      postInitApplicationSQL:
        - "CREATE SCHEMA IF NOT EXISTS eos_omop;"
        - "GRANT USAGE ON SCHEMA eos_omop TO eos;"
        - "ALTER DEFAULT PRIVILEGES IN SCHEMA eos_omop GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO eos;"
  
  storage:
    size: {{ .Values.postgres.eos.storage | default "50Gi" }}
  
  walStorage:
    size: {{ .Values.postgres.eos.walStorage | default "5Gi" }}

  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
      wal:
        compression: gzip
      data:
        compression: gzip
      recoveryWindowInDays: {{ .Values.postgres.backup.retentionDays | default 30 }}
  {{- end }}
  
  monitoring:
    enablePodMonitor: {{ .Values.monitoring.enabled | default false }}
  
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

{{- end }}
{{- end }}

{{- end }}
