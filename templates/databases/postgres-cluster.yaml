{{- if .Values.postgres.enabled }}

{{- /*
  Secrets are intentionally NOT created in this template.

  Required secrets must be created before installing/upgrading this chart,
  e.g. via create-secret.sh:

    - postgres-cluster-app
    - postgres-eos-user-secret
    - postgres-keycloak-user-secret
    - postgres-numportal-user-secret

  The CNPG Cluster resources below only reference those secrets.
*/ -}}

{{- $eosSharedCluster := and .Values.postgres.eos.enabled (.Values.postgres.eos.sharedCluster | default false) -}}
{{- $hasSharedPostInitSQL := or $eosSharedCluster .Values.postgres.numportal.enabled .Values.postgres.keycloak.enabled -}}
{{- $hasManagedRoles := $hasSharedPostInitSQL -}}

{{- if .Values.postgres.ehrbase.enabled }}
---
# PostgreSQL Cluster for EHRbase and optional shared databases.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgres
    component: ehrbase-database
    release: {{ .Release.Name }}
spec:
  instances: {{ .Values.postgres.ehrbase.instances | default 3 }}

  primaryUpdateStrategy: {{ .Values.postgres.ehrbase.primaryUpdateStrategy | default "unsupervised" }}

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "1280kB"

  bootstrap:
    initdb:
      database: "ehrbase"
      owner: "ehrbase"
      secret:
        name: postgres-cluster-app

      {{- if $hasSharedPostInitSQL }}
      postInitSQL:
        {{- if $eosSharedCluster }}
        # EOS OMOP bridge database on the shared cluster.
        # Password is reconciled later by CNPG managed.roles using postgres-eos-user-secret.
        - "CREATE ROLE eos WITH LOGIN;"
        - "CREATE DATABASE eos_omop OWNER eos;"
        - "GRANT ALL PRIVILEGES ON DATABASE eos_omop TO eos;"
        {{- end }}

        {{- if .Values.postgres.numportal.enabled }}
        # Cohort Explorer / NUM Portal database on the shared cluster.
        # Password is reconciled later by CNPG managed.roles using postgres-numportal-user-secret.
        - "CREATE ROLE numportal WITH LOGIN;"
        - "CREATE DATABASE numportal OWNER numportal;"
        - "GRANT ALL PRIVILEGES ON DATABASE numportal TO numportal;"
        {{- end }}

        {{- if .Values.postgres.keycloak.enabled }}
        # Keycloak database on the shared cluster.
        # Password is reconciled later by CNPG managed.roles using postgres-keycloak-user-secret.
        - "CREATE ROLE keycloak WITH LOGIN;"
        - "CREATE DATABASE keycloak OWNER keycloak;"
        - "GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;"
        {{- end }}
      {{- end }}

      postInitApplicationSQL:
        # EHRbase database setup.
        - "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
        - "CREATE SCHEMA IF NOT EXISTS ehrbase;"
        - "GRANT USAGE ON SCHEMA ehrbase TO ehrbase;"
        - "ALTER DEFAULT PRIVILEGES IN SCHEMA ehrbase GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO ehrbase;"

  storage:
    size: {{ .Values.postgres.ehrbase.storage | default "10Gi" }}

  walStorage:
    size: {{ .Values.postgres.ehrbase.walStorage | default "5Gi" }}

  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
      recoveryWindowInDays: {{ .Values.postgres.backup.retentionDays | default 30 }}
  {{- end }}

  monitoring:
    enablePodMonitor: {{ .Values.monitoring.enabled | default false }}

  {{- if $hasManagedRoles }}
  managed:
    roles:
      {{- if $eosSharedCluster }}
      - name: eos
        ensure: present
        login: true
        passwordSecret:
          name: postgres-eos-user-secret
      {{- end }}

      {{- if .Values.postgres.numportal.enabled }}
      - name: numportal
        ensure: present
        login: true
        passwordSecret:
          name: postgres-numportal-user-secret
      {{- end }}

      {{- if .Values.postgres.keycloak.enabled }}
      - name: keycloak
        ensure: present
        login: true
        passwordSecret:
          name: postgres-keycloak-user-secret
      {{- end }}
  {{- end }}

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
{{- end }}

{{- if .Values.postgres.eos.enabled }}
{{- if not .Values.postgres.eos.sharedCluster }}
---
# Dedicated PostgreSQL Cluster for EOS OMOP CDM.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-eos-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgres
    component: eos-database
    release: {{ .Release.Name }}
spec:
  instances: {{ .Values.postgres.eos.instances | default 2 }}

  primaryUpdateStrategy: {{ .Values.postgres.eos.primaryUpdateStrategy | default "unsupervised" }}

  imageName: "ghcr.io/cloudnative-pg/postgresql:15"

  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "512MB"
      effective_cache_size: "2GB"
      maintenance_work_mem: "128MB"

  bootstrap:
    initdb:
      database: "eos_omop"
      owner: "eos"
      secret:
        name: postgres-eos-user-secret
      postInitApplicationSQL:
        - "CREATE SCHEMA IF NOT EXISTS eos_omop;"
        - "GRANT USAGE ON SCHEMA eos_omop TO eos;"
        - "ALTER DEFAULT PRIVILEGES IN SCHEMA eos_omop GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO eos;"

  storage:
    size: {{ .Values.postgres.eos.storage | default "50Gi" }}

  walStorage:
    size: {{ .Values.postgres.eos.walStorage | default "5Gi" }}

  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
      wal:
        compression: gzip
      data:
        compression: gzip
      recoveryWindowInDays: {{ .Values.postgres.backup.retentionDays | default 30 }}
  {{- end }}

  monitoring:
    enablePodMonitor: {{ .Values.monitoring.enabled | default false }}

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
{{- end }}
{{- end }}

{{- end }}