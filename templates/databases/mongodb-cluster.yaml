{{- $mongodb := .Values.mongodb | default dict -}}
{{- $openfhir := $mongodb.openfhir | default dict -}}
{{- $resources := $openfhir.resources | default dict -}}
{{- $requests := $resources.requests | default dict -}}
{{- $limits := $resources.limits | default dict -}}

{{- if and ($mongodb.enabled | default false) ($openfhir.enabled | default false) }}
---
# MongoDB Replica Set for openFHIR.
#
# Secrets are intentionally NOT created in this template.
# Required secrets must be created before installing/upgrading this chart,
# e.g. via create-secret.sh:
#
#   - mongodb-root-password
#   - mongodb-openfhir-password
#
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongodb
    component: openfhir-database
    release: {{ .Release.Name }}
spec:
  version: "6.0.6"

  members: {{ $openfhir.replicas | default 3 }}

  type: ReplicaSet

  security:
    authentication:
      modes:
        - SCRAM
      ignoreUnknownUsers: true
    tls:
      enabled: false

  users:
    - name: root
      db: admin
      scramCredentialsSecretName: mongodb-root-scram-credentials
      passwordSecretRef:
        name: mongodb-root-password
      roles:
        - name: root
          db: admin

    - name: openfhir
      db: openfhir
      scramCredentialsSecretName: mongodb-openfhir-scram-credentials
      passwordSecretRef:
        name: mongodb-openfhir-password
      roles:
        - name: readWrite
          db: openfhir

  # StatefulSet overrides.
  # Let the MongoDB Community Operator manage selectors, labels,
  # serviceName, and replicas automatically.
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: {{ $requests.cpu | default "100m" | quote }}
                  memory: {{ $requests.memory | default "512Mi" | quote }}
                limits:
                  cpu: {{ $limits.cpu | default "500m" | quote }}
                  memory: {{ $limits.memory | default "1Gi" | quote }}

      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: {{ $openfhir.storage | default "20Gi" | quote }}

{{- end }}