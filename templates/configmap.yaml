apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    release: {{ .Release.Name }}
data:
  # EHRbase endpoint for inter-service communication
  EHRBASE_SERVICE_URL: "http://ehrbase.{{ .Release.Namespace }}.svc.cluster.local:8080"
  
  # openFHIR endpoint
  OPENFHIR_SERVICE_URL: "http://openfhir.{{ .Release.Namespace }}.svc.cluster.local:8080"
  
  # Eos endpoint
  EOS_SERVICE_URL: "http://eos.{{ .Release.Namespace }}.svc.cluster.local:8080"
  
  # PostgreSQL cluster endpoint
  POSTGRES_SERVICE_URL: "postgres-cluster.{{ .Release.Namespace }}.svc.cluster.local:5432"
  
  # MongoDB cluster endpoint
  MONGODB_SERVICE_URL: "mongodb-cluster.{{ .Release.Namespace }}.svc.cluster.local:27017"
  
  # External endpoints (placeholders)
  BETTER_PLATFORM_ENDPOINT: "https://better.charité.example.org"
  
  # Global settings
  ENVIRONMENT: "{{ .Values.global.environment }}"
  TIMEZONE: "{{ .Values.global.timezone }}"
  DOMAIN: "{{ .Values.global.domain }}"
  
  # Logging configuration
  LOG_LEVEL: "INFO"
  
  # OMOP vocabularies status
  ATHENA_VOCABULARIES_PRESENT: "false"  # Set to true when ATHENA vocabularies are loaded
