# Local Linux Mint + Minikube overrides for OHS
# Use with: helm upgrade --install ohs . -n ohs -f values.yaml -f values-minikube.yaml

ingress:
  enabled: false

ehrbase:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"

openfhir:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    ehrbase:
      baseUrl: "http://ohs-ehrbase:8080"

eos:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "3Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"
    ehrbase:
      baseUrl: "http://ohs-ehrbase:8080"
    jvm:
      maxHeapSize: "1g"

# ── Cohort Explorer ───────────────────────────────────────────────────────────
# Images must be built into minikube's Docker daemon before enabling:
#   cd ~/cohort-builds && eval $(minikube docker-env) && export DOCKER_API_VERSION=1.43
#   docker build -t cohort-explorer-backend:local cohort-explorer-backend/
#   docker build --build-arg ENVIRONMENT=deploy -t cohort-explorer-frontend:local cohort-explorer-frontend/

cohort-explorer-backend:
  enabled: true
  replicaCount: 1
  image:
    repository: cohort-explorer-backend
    tag: "local"
    pullPolicy: Never
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"
    keycloak:
      url: "http://ohs-keycloak:8080/auth"   # /auth because KC_HOSTNAME_URL sets relative path
    ehrbase:
      restApiUrl: "http://ohs-ehrbase:8080/ehrbase/"

cohort-explorer-frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: cohort-explorer-frontend
    tag: "local"
    pullPolicy: Never
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    api:
      baseUrl: "http://localhost:8084/num-portal"
    auth:
      baseUrl: "http://localhost:8083/auth"
      realm: "crr"
      clientId: "num-portal-webapp"

keycloak:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    startMode: "start-dev"
    hostname: "localhost"
    hostnameUrl: "http://localhost:8083/auth"
    database:
      host: "postgres-cluster-rw"
      minHeapSize: "256m"
