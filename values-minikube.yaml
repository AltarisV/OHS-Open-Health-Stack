# Local Linux Mint + Minikube overrides for OHS
# Use with: helm upgrade --install ohs . -n ohs -f values.yaml -f values-minikube.yaml

ingress:
  enabled: false

postgres:
  numportal:
    enabled: true
  keycloak:
    enabled: true
  ehrbase:
    instances: 1

mongodb:
  openfhir:
    replicas: 1

ehrbase:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"

openfhir:
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    ehrbase:
      baseUrl: "http://ohs-ehrbase:8080"

eos:
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "3Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"
    ehrbase:
      baseUrl: "http://ohs-ehrbase:8080"
    jvm:
      maxHeapSize: "1g"

# ── Cohort Explorer ───────────────────────────────────────────────────────────
# Full local profile: Keycloak + Cohort Explorer are enabled here.
# Images must be built into minikube's Docker daemon before installing/upgrading:
#   cd ~/cohort-builds && eval $(minikube docker-env) && export DOCKER_API_VERSION=1.43
#   docker build -t cohort-explorer-backend:local cohort-explorer-backend/
#   docker build --build-arg ENVIRONMENT=deploy -t cohort-explorer-frontend:local cohort-explorer-frontend/

# ── openEHRTool ──────────────────────────────────────────────────────────────
# Images must be built directly into minikube's Docker daemon before installing/upgrading:
#   eval $(minikube docker-env) && export DOCKER_API_VERSION=1.43
#   OPENEHRTOOL_BACKEND_HOSTNAME=openehrtool bash build-images.sh --registry localhost:5000 --skip-push --component openehrtool-backend
#   OPENEHRTOOL_BACKEND_HOSTNAME=openehrtool bash build-images.sh --registry localhost:5000 --skip-push --component openehrtool-frontend

openehrtool-redis:
  enabled: true

openehrtool-backend:
  enabled: true
  image:
    repository: "localhost:5000/openehrtool-backend"
    tag: "ohs"
    pullPolicy: Never
  ingress:
    host: "openehrtool"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    redis:
      hostname: "ohs-openehrtool-redis"

openehrtool-frontend:
  enabled: true
  image:
    repository: "localhost:5000/openehrtool-frontend"
    tag: "ohs"
    pullPolicy: Never
  ingress:
    host: "openehrtool"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false

cohort-explorer-backend:
  enabled: true
  replicaCount: 1
  image:
    repository: cohort-explorer-backend
    tag: "local"
    pullPolicy: Never
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    database:
      host: "postgres-cluster-rw"
    keycloak:
      url: "http://ohs-keycloak:8080/auth"   # /auth because KC_HOSTNAME_URL sets relative path
    ehrbase:
      restApiUrl: "http://ohs-ehrbase:8080/ehrbase/"

cohort-explorer-frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: cohort-explorer-frontend
    tag: "local"
    pullPolicy: Never
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  config:
    api:
      baseUrl: "http://localhost:8084/num-portal"
    auth:
      baseUrl: "http://localhost:8083/auth"
      realm: "crr"
      clientId: "num-portal-webapp"

keycloak:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: true
    httpGet:
      path: /auth/realms/master/.well-known/openid-configuration
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    enabled: true
    httpGet:
      path: /auth/realms/master/.well-known/openid-configuration
      port: 8080
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  config:
    startMode: "start-dev"
    hostname: "localhost"
    hostnameUrl: "http://localhost:8083/auth"
    database:
      host: "postgres-cluster-rw"
      minHeapSize: "256m"
